site_name: KV Cache 源码深度分析
site_description: 深入剖析 vLLM 框架中 KV Cache 的调度与管理机制
repo_url: https://github.com/Rigel-Chen/vllm-walkthrough.git
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - admonition
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_if_no_docstring: true
            heading_level: 2
            separate_signature: true
            show_signature_annotations: true

nav:
  - 首页: index.md
  - 调用结构树: architecture.md
  - API 文档:
      - BlockPool: api/block_pool.md
      - KVCacheManager: api/kv_cache_manager.md
      - Scheduler: api/scheduler.md
      - Engine: api/llm_engine.md
