site_name: KV Cache 源码深度分析
site_description: 深入剖析 vLLM 等框架中 KV Cache 的调度与管理
repo_url: https://github.com/你的用户名/仓库名
edit_uri: edit/main/docs/   # 可选：在线编辑链接

theme:
  name: material
  language: zh
  features:
    - navigation.tabs        # 顶部标签导航
    - navigation.top         # 回到顶部按钮
    - search.highlight       # 搜索高亮
    - search.share           # 搜索分享
    - content.code.copy      # 代码块复制按钮
    - content.code.annotate  # 代码注解
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - admonition
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]          # 你的源码所在目录，支持自动查找
          options:
            show_source: true
            show_root_heading: true
            show_if_no_docstring: true
            heading_level: 2
            separate_signature: true
            show_signature_annotations: true

nav:
  - 首页: index.md
  - 调用结构树: architecture.md
  - API 文档:
      - KVCacheBlocks: api/kv_cache_blocks.md
      - KVCacheManager: api/kv_cache_manager.md
      - BlockPool: api/block_pool.md
      # 更推荐直接让 mkdocstrings 自动生成，占位文件见下文
